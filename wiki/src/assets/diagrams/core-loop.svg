<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 260" width="920" height="260" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="The Locatour core loop: find a place, go there, check in with a photo, earn experience, unlock more — and repeat.">
  <rect x="0" y="0" width="920" height="260" rx="20" fill="#FFFDFB"/>
  <text x="460" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#2a1a14">The core loop</text>

  <!-- nodes -->
  <g>
    <!-- 1 Find -->
    <rect x="24" y="78" width="150" height="92" rx="14" fill="#FCF0E8" stroke="#d1453b" stroke-width="2"/>
    <text x="99" y="112" text-anchor="middle" font-size="26">🗺️</text>
    <text x="99" y="142" text-anchor="middle" font-size="15" font-weight="700" fill="#2a1a14">Find a place</text>

    <!-- 2 Go -->
    <rect x="208" y="78" width="150" height="92" rx="14" fill="#FCF0E8" stroke="#b46c00" stroke-width="2"/>
    <text x="283" y="112" text-anchor="middle" font-size="26">🚶</text>
    <text x="283" y="142" text-anchor="middle" font-size="15" font-weight="700" fill="#2a1a14">Go there</text>

    <!-- 3 Check in -->
    <rect x="392" y="78" width="150" height="92" rx="14" fill="#FCF0E8" stroke="#7c5cff" stroke-width="2"/>
    <text x="467" y="112" text-anchor="middle" font-size="26">📸</text>
    <text x="467" y="138" text-anchor="middle" font-size="15" font-weight="700" fill="#2a1a14">Check in</text>
    <text x="467" y="156" text-anchor="middle" font-size="12" fill="#6b5a50">with a photo</text>

    <!-- 4 Earn -->
    <rect x="576" y="78" width="150" height="92" rx="14" fill="#FCF0E8" stroke="#ea739c" stroke-width="2"/>
    <text x="651" y="112" text-anchor="middle" font-size="26">⭐</text>
    <text x="651" y="142" text-anchor="middle" font-size="15" font-weight="700" fill="#2a1a14">Earn XP</text>

    <!-- 5 Unlock -->
    <rect x="760" y="78" width="150" height="92" rx="14" fill="#FCF0E8" stroke="#208aef" stroke-width="2"/>
    <text x="835" y="112" text-anchor="middle" font-size="26">🔓</text>
    <text x="835" y="142" text-anchor="middle" font-size="15" font-weight="700" fill="#2a1a14">Unlock more</text>
  </g>

  <!-- arrows between nodes -->
  <g stroke="#caa" stroke-width="2.5" fill="none" marker-end="url(#ar)">
    <line x1="178" y1="124" x2="204" y2="124"/>
    <line x1="362" y1="124" x2="388" y2="124"/>
    <line x1="546" y1="124" x2="572" y2="124"/>
    <line x1="730" y1="124" x2="756" y2="124"/>
  </g>

  <!-- loop-back arrow from Unlock to Find -->
  <path d="M 835 170 L 835 212 Q 835 228 819 228 L 115 228 Q 99 228 99 212 L 99 174" fill="none" stroke="#d1453b" stroke-width="2.5" stroke-dasharray="6 5" marker-end="url(#arr)"/>
  <text x="460" y="222" text-anchor="middle" font-size="13" font-style="italic" fill="#d1453b">…and explore further</text>

  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#caa"/></marker>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#d1453b"/></marker>
  </defs>
</svg>
